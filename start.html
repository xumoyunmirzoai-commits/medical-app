<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>MedCore</title></head><body>
<script>
// Demo rejimi olib tashlandi — faqat Google akkaunt orqali kirish.
// Mavjud sessiya bo'lsa ilovaga, aks holda login sahifasiga yo'naltiramiz.
(function(){
  var hasSession = false;
  try { hasSession = !!localStorage.getItem('mc_auth_user'); } catch(e) {}
  window.location.replace(hasSession ? 'index.html' : 'login.html');
})();
</script>
</body></html>
