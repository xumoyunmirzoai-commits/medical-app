name: 🔔 Foydalanuvchilarga bildirishnoma yuborish

on:
  push:
    branches: [ main ]
    paths:
      - 'pharma_data.js'
      - 'data.js'
  workflow_dispatch:
    inputs:
      title:
        description: 'Bildirishnoma sarlavhasi'
        required: false
        default: "💊 Yangi dori qo'shildi!"
      body:
        description: 'Bildirishnoma matni'
        required: false
        default: "Flukonazol (D01AC15) — zamburug'larga qarshi preparat ma'lumotlari qo'shildi!"

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Xabar matni tayyorlash
        id: msg
        run: |
          # workflow_dispatch bo'lsa — kiritilgan qiymatlarni ishlatish
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "title=${{ github.event.inputs.title }}" >> $GITHUB_OUTPUT
            echo "body=${{ github.event.inputs.body }}" >> $GITHUB_OUTPUT
          else
            FILES=$(echo '${{ toJson(github.event.commits) }}' | jq -r '.[0].modified // [] | join(" ")')
            if echo "$FILES" | grep -q "pharma_data.js"; then
              echo "title=💊 Farmakologiya yangilandi!" >> $GITHUB_OUTPUT
              echo "body=Yangi dori ma'lumotlari qo'shildi. Ko'rish uchun bosing." >> $GITHUB_OUTPUT
            elif echo "$FILES" | grep -q "data.js"; then
              echo "title=🆕 Yangi dorilar qo'shildi!" >> $GITHUB_OUTPUT
              echo "body=MedCore bazasiga yangi dorilar qo'shildi." >> $GITHUB_OUTPUT
            else
              echo "title=🔄 MedCore yangilandi" >> $GITHUB_OUTPUT
              echo "body=Ilova yangi imkoniyatlar bilan to'ldirildi." >> $GITHUB_OUTPUT
            fi
          fi
      - name: Reponi yuklab olish
        uses: actions/checkout@v4
        
      - name: Node.js o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: web-push kutubxonasini o'rnatish
        run: npm install web-push --no-save

      - name: Web Push bildirishnoma yuborish
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          PUSH_API: ${{ secrets.PUSH_API }}
          PUSH_ADMIN_KEY: ${{ secrets.PUSH_ADMIN_KEY }}
          NOTIF_TITLE: ${{ steps.msg.outputs.title }}
          NOTIF_BODY: ${{ steps.msg.outputs.body }}
        run: node push/send.js
